<style>
  :root {
    --bg: #e8e8e8;
    --text: #222;
    --accent: #e30613;
    --border: #e5e5e5;
    --panel-bg: rgba(255,255,255,0.96);
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:var(--bg); font-family: -apple-system, "Segoe UI", "Helvetica Neue", "Hiragino Sans", "Noto Sans JP", sans-serif; color:var(--text); }
  #app { position:fixed; inset:0; }

  #progress { position:fixed; top:0; left:0; right:0; height:3px; background:transparent; z-index:50; }
  #progress::after { content:''; display:block; height:100%; width:0%; background:var(--accent); transition: width .2s ease; }
  #progress.loading::after { width: var(--p, 30%); }
  #progress.done::after { width:100%; opacity:0; transition: opacity .4s ease .1s; }

  #topbar {
    position:fixed; top:0; left:0; right:0; padding:14px 24px;
    display:flex; align-items:center; justify-content:space-between; z-index:20; pointer-events:none;
  }
  #topbar > * { pointer-events:auto; }
  #back { display:inline-flex; align-items:center; gap:6px; color:var(--text); text-decoration:none; font-size:13px; padding:6px 8px; border-radius:4px; }
  #back:hover { background:rgba(0,0,0,.04); text-decoration:underline; }
  #back svg { width:14px; height:14px; }

  .pill {
    display:inline-flex; align-items:center; gap:6px; padding:8px 14px; background:#fff;
    border:1px solid var(--border); border-radius:999px; font-size:12px; font-weight:500;
    cursor:pointer; box-shadow:0 1px 3px rgba(0,0,0,.06); color:var(--text); transition: all .15s ease;
  }
  .pill:hover { background:#fafafa; transform: translateY(-1px); box-shadow:0 2px 6px rgba(0,0,0,.1); }
  .pill svg { width:14px; height:14px; }

  #btnRotate { opacity: 0; transform: translateY(-8px) scale(.96); pointer-events:none; transition: opacity .25s ease, transform .25s ease; }
  #btnRotate.show { opacity: 1; transform: translateY(0) scale(1); pointer-events:auto; }

  #fsBtn {
    position:fixed; right:16px; bottom:16px; width:36px; height:36px; border-radius:50%; border:none;
    background:#fff; border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 1px 3px rgba(0,0,0,.08); z-index:20;
  }
  #fsBtn:hover { background:#f6f6f6; }
  #fsBtn svg { width:18px; height:18px; }

  #shootBtn {
    position:fixed; right:60px; bottom:16px; width:36px; height:36px; border-radius:50%; border:none;
    background:#fff; border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 1px 3px rgba(0,0,0,.08); z-index:20;
  }
  #shootBtn:hover { background:#f6f6f6; }
  #shootBtn svg { width:18px; height:18px; }

  #shareBtn {
    position:fixed; right:104px; bottom:16px; height:36px; padding:0 16px; border-radius:18px; border:none;
    background:#fff; border:1px solid var(--border); cursor:pointer; display:flex; align-items:center; gap:6px; justify-content:center;
    box-shadow:0 1px 3px rgba(0,0,0,.08); z-index:20; font-size:12px; font-weight:500; color:var(--text);
    transition: all .15s ease;
  }
  #shareBtn:hover { background:#f6f6f6; transform: translateY(-1px); box-shadow:0 2px 8px rgba(0,0,0,.12); }
  #shareBtn svg { width:14px; height:14px; }
  #shareBtn.copied { background:#4caf50; color:#fff; border-color:#4caf50; }

  /* ====== デモパネル（フォームから来た時は非表示） ====== */
  #demoPanel {
    position:fixed; right:16px; top:60px; width:300px; max-height:calc(100vh - 80px);
    background:var(--panel-bg); border:1px solid var(--border); border-radius:10px;
    padding:14px; font-size:12px; box-shadow:0 4px 14px rgba(0,0,0,.08); z-index:25;
    overflow-y:auto; backdrop-filter: blur(8px);
  }
  #demoPanel.hidden { display:none; }
  #demoPanel h3 { margin:0 0 10px; font-size:13px; display:flex; align-items:center; gap:6px; }
  #demoPanel h3 .badge { font-size:10px; background:#ff9800; color:#fff; padding:2px 8px; border-radius:10px; font-weight:600; }
  #demoPanel h4 { margin:14px 0 6px; font-size:11px; color:#666; text-transform:uppercase; letter-spacing:.5px; }
  #demoPanel label { display:block; margin:6px 0; font-size:11px; color:#444; }
  #demoPanel select, #demoPanel input[type=color], #demoPanel input[type=text] {
    width:100%; padding:5px 8px; border:1px solid var(--border); border-radius:4px; font-size:11px; margin-top:2px;
  }
  #demoPanel button {
    width:100%; padding:7px; border:none; border-radius:4px; cursor:pointer; font-size:11px;
    background:#2196F3; color:white; margin-top:6px; font-weight:500;
  }
  #demoPanel button:hover { background:#1976D2; }
  #demoPanel button.secondary { background:#757575; }
  #demoPanel button.danger { background:#f44336; }
  #demoPanel button.success { background:#4caf50; }
  .print-row {
    background:#f5f5f5; padding:8px; border-radius:4px; margin:6px 0;
    border-left:3px solid #2196F3;
  }
  .print-row .ph { font-weight:600; font-size:11px; color:#333; margin-bottom:4px; }
  .print-row .pi { font-size:10px; color:#666; line-height:1.4; }
  .print-row .actions { display:flex; gap:4px; margin-top:6px; }
  .print-row .actions button { flex:1; padding:3px; font-size:10px; margin:0; }
  .file-input-wrap { position:relative; }
  .file-input-wrap input[type=file] { width:100%; font-size:10px; }
  .preset-colors { display:grid; grid-template-columns: repeat(6, 1fr); gap:4px; margin-top:6px; }
  .preset-colors div { aspect-ratio:1; border-radius:50%; cursor:pointer; border:2px solid #fff; box-shadow: 0 0 0 1px #ccc; }

  #colorPanel {
    position:fixed; left:16px; bottom:16px; background:#fff; border:1px solid var(--border); padding:10px 12px;
    border-radius:10px; display:flex; align-items:center; gap:10px; font-size:12px; box-shadow:0 1px 3px rgba(0,0,0,.06); z-index:20;
  }
  #colorPanel.hidden { display:none; }
  #colorPanel label { display:flex; align-items:center; gap:8px; cursor:pointer; }
  #colorPanel input[type=color] { width:28px; height:28px; border:none; padding:0; background:none; cursor:pointer; }
  #colorPanel button {
    border:1px solid var(--border); background:#fff; border-radius:6px; padding:4px 10px; font-size:11px; cursor:pointer;
  }
  #colorPanel button:hover { background:#f6f6f6; }

  #error {
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; color:#c22;
    border:1px solid #f4c7c7; padding:16px 22px; border-radius:10px; max-width:520px;
    box-shadow:0 6px 30px rgba(0,0,0,.1); display:none; z-index:50;
  }
  #error h3 { margin:0 0 8px; font-size:14px; }
  #error p { margin:4px 0; font-size:12px; color:#555; }

  #hint {
    position:fixed; left:50%; bottom:16px; transform:translateX(-50%);
    background:rgba(0,0,0,.72); color:#fff; padding:6px 14px; border-radius:999px; font-size:11px;
    opacity:0; transition:opacity .4s ease; pointer-events:none; z-index:15;
  }
  #hint.show { opacity:1; }

  /* embed=1 モード（iframe埋め込み用）— v13プロトに最適化
     - 不要ボタンは display:none、ただし #topbar 自体は残して btnRotate を残す
     - body 背景を dark に変更し、stage::before の暗グラデと馴染ませる */
  body.embed {
    background: #0a0a0a !important;            /* 親ページの暗ステージと馴染む dark theme */
  }
  body.embed #colorPanel,
  body.embed #fsBtn,
  body.embed #shootBtn,
  body.embed #shareBtn,
  body.embed #back,
  body.embed #demoPanel,
  body.embed #hint { display:none !important; }
  /* topbar は維持（btnRotate 表示のため） — intro時は親側で iframe pointer-events:none なので
     btnRotate は触れない＝視覚的にも自動回転中は updateRotateBtn() で隠れるため安全 */
  body.embed #topbar { padding:6px 10px; justify-content:flex-end; pointer-events:none; background:transparent; border:none; }
  body.embed #topbar #btnRotate { pointer-events:auto; }
</style>

    戻る

<script>
function _3d_goBack(){
  // 2026-04-25: ブラウザが window.close() をブロックするケース（クロスオリジン/直接URL等）
  //             にも確実に元ページへ戻るため、段階的フォールバックを実装。
  // 1) opener タブが生きているなら、opener にフォーカスしてから自タブを閉じる
  //    (→ 新タブで開いた普通のケース。ユーザー視点では opener タブに戻る)
  if(window.opener && !window.opener.closed){
    try { window.opener.focus(); } catch(e){}
    try { window.close(); } catch(e){}
    // close がブロックされたときのフォールバック（150ms後にまだここにいたら実行）
    setTimeout(()=> _3d_goBackFallback(), 150);
    return;
  }
  // 2) opener なし → ブラウザ履歴を1段戻す
  if(history.length > 1){
    try { history.back(); return; } catch(e){}
  }
  // 3) 最終: referrer に遷移 or ウィンドウを閉じる
  _3d_goBackFallback();
}
function _3d_goBackFallback(){
  try {
    if(document.referrer){
      // 元ページの URL に直接戻る（現タブを置換）
      location.href = document.referrer;
      return;
    }
  } catch(e){}
  try { window.close(); } catch(e){}
  // それでも閉じられない場合は、ユーザーに手動で閉じてもらう
}
</script>

function getScaleFactor(areaKey, method, sizeName) {

const progress = document.getElementById('progress');
const errorEl = document.getElementById('error');
const errorDetailEl = document.getElementById('errorDetail');
const hintEl = document.getElementById('hint');
const btnRotate = document.getElementById('btnRotate');

function setProgress(pct) { progress.classList.add('loading'); progress.style.setProperty('--p', pct + '%'); }
function doneProgress() { progress.classList.remove('loading'); progress.classList.add('done'); }

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xe8e8e8);

const camera = new THREE.PerspectiveCamera(32, innerWidth/innerHeight, 0.01, 100);
camera.position.set(0, 1.2, 2.6);

// 2026-04-25 (rev2): embed mode は body bg と完全に同じ #0a0a0a で塗りつぶす
//   → スライド時に iframe の「モデルが居ない部分」も親ステージと完全一致 → 黒帯消滅
//   alpha:false の方が描画コスト低い & contrast 0 は確実
const _isEmbedMode = new URLSearchParams(location.search).get('embed') === '1';
// ★ F10 2026-04-30: iOS 安定化
//   - antialias を iOS で false にする (古いiPad/iPhone では描画エラー要因)
//   - preserveDrawingBuffer は screenshot が必要な時のみ true
//   - PixelRatio はモバイルで 1.5 に制限 (memory 削減)
const _ua = navigator.userAgent || '';
const _isIOS = /iP(ad|hone|od)/.test(_ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
const _isMobile = _isIOS || /Android|Mobile/.test(_ua);
let renderer;
try {
  renderer = new THREE.WebGLRenderer({
    antialias: !_isIOS,                     // iOS では antialias OFF (安定化)
    alpha: _isEmbedMode,                    // embed 時は透過 (親の bg / text が透ける)
    preserveDrawingBuffer: !_isMobile,      // モバイルでは false でメモリ削減
    powerPreference: 'default',
    failIfMajorPerformanceCaveat: false,
  });
} catch(e){
  // WebGL 取得失敗 (iOS Low Power Mode 等)
  console.error('WebGLRenderer creation failed', e);
  document.getElementById('error').style.display = 'block';
  document.getElementById('errorDetail').textContent = 'WebGL 初期化エラー: ' + (e.message || e);
  throw e;
}
if(_isEmbedMode){
  renderer.setClearColor(0x000000, 0);   // 透過クリア
}
// embed mode 以外は body bg = var(--bg) #e8e8e8 (light) のまま
// ★ L1 2026-05-02: iOS は DPR 1.0 まで下げる (メモリ削減を強化)
const _MAX_DPR = _isIOS ? 1.0 : (_isMobile ? 1.5 : 2);
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, _MAX_DPR));
renderer.setSize(innerWidth, innerHeight);

// ★ F10: WebGL context-lost ハンドラ (iOS でメモリ不足時の自動リカバリ)
const _glCanvas = renderer.domElement;
_glCanvas.addEventListener('webglcontextlost', (ev) => {
  ev.preventDefault();
  console.warn('WebGL context lost — attempting recovery in 1s');
  try {
    const errEl = document.getElementById('error');
    if(errEl){
      errEl.style.display = 'block';
      const det = document.getElementById('errorDetail');
      if(det) det.textContent = '3D描画が一時停止しました。再試行中…';
    }
  } catch(e){}
}, false);
_glCanvas.addEventListener('webglcontextrestored', () => {
  console.log('WebGL context restored');
  try {
    const errEl = document.getElementById('error');
    if(errEl) errEl.style.display = 'none';
  } catch(e){}
  // ★ G2 2026-04-30: iframe 内だけリロード (location.reload は親ページに影響しないが念のため try/catch)
  //   親ページが最上部なら問題ないが、 iframe 内なら自分だけリロード
  try {
    if(window.parent && window.parent !== window){
      // iframe 内: 親に再ロード依頼 (失敗しても無害)
      window.parent.postMessage({ type: 'tshirt3d-context-lost' }, '*');
    } else {
      setTimeout(() => { try{ location.reload(); }catch(e){} }, 200);
    }
  } catch(e){}
}, false);
renderer.outputColorSpace = THREE.SRGBColorSpace;
// ACESFilmicは映画的に色を圧縮するため、シャツの色再現には NoToneMapping が忠実
renderer.toneMapping = THREE.NoToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById('app').appendChild(renderer.domElement);
// ★ M7 ④ 2026-05-03: スマホでも canvas を touch でドラッグ回転可能に
//   touch-action: none → ブラウザのスクロール・ピンチをキャンセル → OrbitControls が確実に gesture を受け取る
renderer.domElement.style.touchAction = 'none';
renderer.domElement.style.userSelect = 'none';
renderer.domElement.style.webkitUserSelect = 'none';

// ★ L1 2026-05-02: iOS は sigma を 0.5 まで上げて生成解像度を下げる (メモリ削減)
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
const _pmremSigma = _isIOS ? 0.5 : 0.04;  // iOS は粗めで十分 (intensity=0 なので見えない)
scene.environment = pmrem.fromScene(new RoomEnvironment(), _pmremSigma).texture;

// ============================================================
// 2026-04-25: 外部からの "魔法スピン" 制御（v13プロトタイプ用）
//   - rotationSpeed: 通常時の autoRotateSpeed を上書き（未指定なら現状の 2.5 維持）
//   - spinOnce: true で「正面に瞬時スナップ → 288°を1.4秒でcubicカーブ → baseline速度の連続回転にスムーズ接続」
//   ★ cubic多項式 f(s) = a*s + b*s² + c*s³ を使い、f'(1) が baseline角速度に
//     一致するよう係数を計算。これにより spin 終了時の "停止 → 再起動" 不連続を解消。
//   ★ 後方互換: これらフィールドを含まない既存呼び出しは従来通り動作する
// ============================================================
let _baselineRotateSpeed = controls.autoRotateSpeed;
const _SPIN_TOTAL_RAD     = 288 * Math.PI / 180;       // 288°
const _SPIN_DURATION_MS   = 1800;                      // スピン本編 (静止フェーズ含まず)
const _SPIN_HOLD_MS       = 250;                       // ★ 開始前「正面静止」フェーズ
const _SPIN_ACC_START     = 4.0;                       // f''(0) — 初期加速度（大きいほど早く速度上昇）
let _spinning = false;
let _spinStartTime = 0;                                // 静止フェーズ込みの開始時刻
let _spinAccumulatedRad = 0;
// quintic多項式 f(s) = a*s + b*s² + c*s³ + d*s⁴ + e*s⁵
// 制約: f(0)=0, f(1)=1, f'(0)=0, f'(1)=baseline, f''(0)=accStart, f''(1)=0
//   → 速度0から滑らかに加速 → baseline速度で滑らかに着地
//   → "正面で一瞬止まって見える" + "ゆっくり連続回転に滑らか接続" の両立
let _spinCoefA = 0, _spinCoefB = 0, _spinCoefC = 0, _spinCoefD = 0, _spinCoefE = 0;

let initialCamPos = camera.position.clone();
let initialTarget = controls.target.clone();

// 2026-04-25: 魔法スピン用ヘルパー — initialCamPos/initialTarget が確定した後に定義
function _snapToFront() {
  // 正面位置に瞬時にスナップ
  camera.position.copy(initialCamPos);
  controls.target.copy(initialTarget);
  camera.lookAt(controls.target);
  // ★ OrbitControls の内部 spherical state を新しい camera.position から再構築させる
  //   damping を一時OFFしないと、damping smoother が前の位置に引き戻してしまう
  const damping = controls.enableDamping;
  controls.enableDamping = false;
  controls.update();
  controls.enableDamping = damping;
}
function _rotateCameraAroundTargetY(deltaRad) {
  // controls.target の Y軸まわりに camera を deltaRad 回転させる。
  // 2026-04-25 修正: 符号を反転して OrbitControls の autoRotate (CCW from +Y) と
  // 同じ方向に回るようにした。これで spin と通常自動回転の方向が一致する。
  const target = controls.target;
  const ox = camera.position.x - target.x;
  const oz = camera.position.z - target.z;
  const cos = Math.cos(deltaRad), sin = Math.sin(deltaRad);
  const nx = ox * cos - oz * sin;
  const nz = ox * sin + oz * cos;
  camera.position.x = target.x + nx;
  camera.position.z = target.z + nz;
  camera.lookAt(target);
}
function _triggerMagicSpin() {
  _spinning = true;
  _spinStartTime = performance.now();   // 0..HOLD は静止 / HOLD..HOLD+DURATION は spin
  _spinAccumulatedRad = 0;
  controls.autoRotate = false;

  // baseline角速度（rad/sec）
  const baselineRadPerSec = _baselineRotateSpeed * (Math.PI / 30);
  // f'(1) = baseline_velocity を normalized time 単位に換算
  const v1 = baselineRadPerSec * (_SPIN_DURATION_MS / 1000) / _SPIN_TOTAL_RAD;
  // quintic 解（f(0)=0, f(1)=1, f'(0)=0, f'(1)=v1, f''(0)=accStart, f''(1)=0）
  //   a = 0
  //   b = accStart / 2
  //   e = 6 - b - 3*v1
  //   d = 3*b + 7*v1 - 15
  //   c = 1 - b - d - e
  const b = _SPIN_ACC_START / 2;
  _spinCoefA = 0;
  _spinCoefB = b;
  _spinCoefE = 6 - b - 3 * v1;
  _spinCoefD = 3 * b + 7 * v1 - 15;
  _spinCoefC = 1 - b - _spinCoefD - _spinCoefE;

  _snapToFront();                       // 正面スナップ + OrbitControls 内部状態同期
  // 2026-04-26: spin中は updateRotateBtn を呼ばない
  //   呼ぶと autoRotate=false の状態でボタンが瞬間的に表示されてしまうため。
  //   spin 終了時の tick() で autoRotate=true に戻したあと updateRotateBtn() が呼ばれる。
}

// ★ 2026-04-25 追加: spin なしで camera を正面にリセットする
//   STEP01 戻り時など、ユーザーがズーム・回転で動かした視点を初期化したい場面用
function _resetView() {
  if (_spinning) { _spinning = false; }
  _spinAccumulatedRad = 0;
  _snapToFront();
  controls.autoRotateSpeed = _baselineRotateSpeed;
  controls.autoRotate = true;
  updateRotateBtn();
}

// ★ 2026-04-26 追加: 指定 area が見える角度に滑らかに回転
//   v13 STEP 5 でプリント箇所を選んだ時、その箇所が画面中央に来るように 360°+α回す。
//   Y軸まわりの回転のみ（カメラ高さ・距離は維持）。autoRotate と magic spin の中間動作。
const AREA_FOCUS_ANGLES_Y = {
  // 2026-04-26 修正: 左右を反転 (GLB モデルの軸とユーザー視点の対応)
  front_center:  0,
  back_center:   Math.PI,
  back_upper:    Math.PI,
  left_chest:    Math.PI * 0.30,     // 着る人の左胸 = カメラから見て右側に位置
  right_chest:   -Math.PI * 0.30,    // 着る人の右胸 = カメラから見て左側
  left_sleeve:   Math.PI * 0.55,     // 着る人の左袖
  right_sleeve:  -Math.PI * 0.55,    // 着る人の右袖
  front_hem:     0,
  back_hem:      Math.PI,
  other:         0,
};
let _focusing = false;
let _focusStartTime = 0;
let _focusFromRad = 0;
let _focusDeltaRad = 0;
let _focusAccumulated = 0;        // ★ 累積回転量 (magic spin の _spinAccumulatedRad と同役割)
let _pendingFocusArea = null;     // (廃止予定だが互換性のため残す)
const _FOCUS_DURATION_MS = 1300;  // ぐるっと回って止まるまでの時間 (1.3秒)

function _getCurrentCameraYAngle() {
  // 現在のカメラの Y軸まわり角度 (controls.target を中心)
  const dx = camera.position.x - controls.target.x;
  const dz = camera.position.z - controls.target.z;
  return Math.atan2(dx, dz);  // +Z 正面を 0 とする
}
function _focusToArea(areaKey) {
  const targetAngle = AREA_FOCUS_ANGLES_Y[areaKey];
  if (typeof targetAngle !== 'number') return;
  // ★ 2026-04-26 シンプル化: magic spin (色選択時の動作) と同じ「中断して再起動」方式
  //   - magic spin 中は無視 (色変更などが走ってる)
  //   - focusing 中なら中断して、現在角度から新しい focus を開始
  //   → 連打しても累積でぐるぐるしない。各タップで「現在地から目標まで1周」のみ。
  if (_spinning) return;
  _pendingFocusArea = null;        // キュー機構は使わない
  controls.autoRotate = false;
  _focusing = true;                // 既に true でも上書きで OK (進行中アニメをリスタート)
  _focusStartTime = performance.now();
  _focusAccumulated = 0;           // ★ 累積カウンタを 0 に戻す (リスタート時)
  _focusFromRad = _getCurrentCameraYAngle();
  // ★ atan2 値 (= AREA_FOCUS_ANGLES_Y) と rotate 量 (= _rotateCameraAroundTargetY 引数) は
  //   符号が逆。 _rotateCameraAroundTargetY(+θ) でカメラ atan2 値が -θ 変化する。
  //   さらに「autoRotate と同じ方向 (CCW = +rotate 量) で一周追加」したいので最終的に + にする。
  let atan2Delta = targetAngle - _focusFromRad;
  while (atan2Delta >  Math.PI) atan2Delta -= 2 * Math.PI;
  while (atan2Delta < -Math.PI) atan2Delta += 2 * Math.PI;
  // rotate 量に変換 (符号反転) + 一周追加 (autoRotate と同じ CCW 方向)
  _focusDeltaRad = -atan2Delta + 2 * Math.PI;
  updateRotateBtn();
}

function initTextureCompose() {
  const targetMesh = shirtMeshes.find(m => m.material?.map);
  if (!targetMesh) {
    console.warn('material.map not found'); return;
  }
  const originalTex = targetMesh.material.map;
  origTexImage = originalTex.image;
  if (!origTexImage) return;

  // 2026-04-23: GLBのテクスチャ解像度が低い場合でもプリントを鮮明に描くため、
  //             キャンバスサイズを最低 REFERENCE_TEX_SIZE (2048) 以上に拡張する。
  //             UVは正規化されているのでサイズを変えてもマッピングは崩れない。
  // 2026-04-24 夜: さらに高解像度化 — プリント部分のキャンバスは 4096px に拡張
  //   PRINT_AREAS は 2048 reference なので、4096 → sx=2.0 倍で位置は自動スケール。
  //   袖などの小エリアが 205→410px、前面センターが 465→930px になり、文字の鮮鋭度が
  //   さらにUP（とくに MIYAMOTO / HOMARE のようなアーチテキスト）。
  //   REFERENCE_TEX_SIZE は 2048 維持なので、位置ズレは発生しない（前回の失敗とは別アプローチ）。
  //   4096 は WebGL 必須サポート最低限（大抵のGPUで安全）。
  const origW = origTexImage.width || origTexImage.naturalWidth;
  const origH = origTexImage.height || origTexImage.naturalHeight;
  const ar = origW / origH;
  // ★ L1 2026-05-02: iOS は canvas 1024 まで下げる (ポロ以降のメモリ枯渇対策)
  //   2048²×4byte = 16MB → 1024²×4byte = 4MB に削減 (画質は妥協・安定優先)
  const TARGET_CANVAS_MIN = _isIOS ? 1024 : 4096;
  const w = Math.max(origW, TARGET_CANVAS_MIN);
  const h = Math.max(origH, Math.round(w / ar));

  // PRINT_AREASをテクスチャサイズにスケール
  // ★ 2026-04-22 修正: 保存された (x, y) は Illustrator で「中央参照点」で測定された
  //                    矩形の中心座標。コードは左上として使うので (x - w/2, y - h/2) に変換。
  const sx = w / REFERENCE_TEX_SIZE;
  const sy = h / REFERENCE_TEX_SIZE;
  scaledAreas = {};
  for (const k in PRINT_AREAS) {
    const a = PRINT_AREAS[k];
    const scaledW = a.width * sx;
    const scaledH = a.height * sy;
    scaledAreas[k] = {
      ...a,
      x: a.x * sx - scaledW / 2,
      y: a.y * sy - scaledH / 2,
      width: scaledW,
      height: scaledH,
    };
  }

  baseCanvas = document.createElement('canvas');
  baseCanvas.width = w;
  baseCanvas.height = h;
  baseCtx = baseCanvas.getContext('2d');
  // 2026-04-22: 高品質スムージングをデフォルトに
  baseCtx.imageSmoothingEnabled = true;
  baseCtx.imageSmoothingQuality = 'high';

  printCanvas = document.createElement('canvas');
  printCanvas.width = w;
  printCanvas.height = h;
  printCtx = printCanvas.getContext('2d');
  printCtx.imageSmoothingEnabled = true;
  printCtx.imageSmoothingQuality = 'high';

  currentTexture = new THREE.CanvasTexture(baseCanvas);
  currentTexture.colorSpace = THREE.SRGBColorSpace;
  currentTexture.flipY = originalTex.flipY;
  currentTexture.wrapS = originalTex.wrapS;
  currentTexture.wrapT = originalTex.wrapT;
  currentTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
  // 2026-04-22: テクスチャフィルタを三線形補間で鮮明に（デフォルトLinearMipmapLinear）
  currentTexture.minFilter = THREE.LinearMipmapLinearFilter;
  currentTexture.magFilter = THREE.LinearFilter;
  currentTexture.generateMipmaps = true;

  printTexture = new THREE.CanvasTexture(printCanvas);
  printTexture.colorSpace = THREE.SRGBColorSpace;
  printTexture.flipY = originalTex.flipY;
  printTexture.wrapS = originalTex.wrapS;
  printTexture.wrapT = originalTex.wrapT;
  printTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
  printTexture.minFilter = THREE.LinearMipmapLinearFilter;
  printTexture.magFilter = THREE.LinearFilter;
  printTexture.generateMipmaps = true;

  // ボディは map で通常ライティング、プリントは emissiveMap で自発光（色忠実）
  // ★ 2026-05-07 (3rd revision): map のプリント焼き込みを 50% に薄めたので、 emissive を 0.5 に。
  //   map (50% シェーディング受ける) + emissive (0.5 で補正発光) → 適度な発色 + 立体感両立。
  //   緑が蛍光色化せず、 ピンク/黄も白飛びせず、 黒インクは map 側で見える。
  shirtMeshes.forEach(m => {
    if (m.material) {
      m.material.map = currentTexture;
      m.material.emissive = new THREE.Color(0xffffff);
      m.material.emissiveMap = printTexture;
      m.material.emissiveIntensity = 0.5;
      if (m.material.color) m.material.color.set(0xffffff);
      m.material.needsUpdate = true;
    }
  });

  // 初回レンダリング（受け取った設定があれば適用、なければ白Tシャツ）
  applyState();
}

// ディスクから最新の diffuse PNG を読み込んで origTexImage 上書き（赤マーカー反映用）
function _tryLoadLatestDiffuse(callback) {
  const img = new Image();
  img.onload = () => { origTexImage = img; _diffuseProcessed = null; callback(); };
  img.onerror = () => callback(); // 失敗時はGLB埋込のまま
  img.src = ACTIVE_MODEL.diffusePath + '?_=' + Date.now();
}

function _ensureDiffuseProcessed() {
  if (_diffuseProcessed || !origTexImage) return;
  const W = baseCanvas.width, H = baseCanvas.height;
  _diffuseProcessed = document.createElement('canvas');
  _diffuseProcessed.width = W;
  _diffuseProcessed.height = H;
  const pctx = _diffuseProcessed.getContext('2d');
  pctx.drawImage(origTexImage, 0, 0, W, H);
  // 黒背景（RGB全て25未満の暗いピクセル）をアルファ0にする
  // → multiply時に黒が乗らず、ボディ色が保たれる
  // → 白パーツや赤マーカー等の有色部分はそのまま multiply される
  try {
    const id = pctx.getImageData(0, 0, W, H);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      if (d[i] < 25 && d[i+1] < 25 && d[i+2] < 25) d[i+3] = 0;
    }
    pctx.putImageData(id, 0, 0);
  } catch(e) {
    // CORSなどでgetImageData失敗時はそのまま使う（黒が出る）
    console.warn('diffuse alpha mask failed:', e);
  }
}

function applyState() {
  if (!baseCanvas) return;

  const W = baseCanvas.width, H = baseCanvas.height;

  // === ボディキャンバス（ライティング適用される）===
  // 1. キャンバス全体をボディ色で塗りつぶし（白は #BFBFBF に自動置換）
  baseCtx.globalCompositeOperation = 'source-over';
  baseCtx.fillStyle = getDisplayBodyColor(state.bodyColor);
  baseCtx.fillRect(0, 0, W, H);

  // 2. URLパラメータ ?showMarkers=1 のときだけ元diffuseのマーカー類を multiply 合成
  const showMarkers = new URLSearchParams(location.search).get('showMarkers') === '1';
  if (showMarkers) {
    if (!_diffuseProcessed && !window._latestDiffuseTried) {
      window._latestDiffuseTried = true;
      _tryLoadLatestDiffuse(() => applyState());
    }
    _ensureDiffuseProcessed();
    if (_diffuseProcessed) {
      baseCtx.globalCompositeOperation = 'multiply';
      baseCtx.drawImage(_diffuseProcessed, 0, 0, W, H);
    }
  }

  // === プリントキャンバス（emissive・明色ブースト用）===
  // 透明にクリアしてからプリントだけ描画
  printCtx.globalCompositeOperation = 'source-over';
  printCtx.clearRect(0, 0, W, H);
  for (const p of state.prints) {
    drawPrint(p, printCtx);
  }

  // === プリントをベースキャンバスにも 50% で描画（2026-05-07 修正）===
  //   理由: map (ライティング受ける) + emissive (発光) の二重描画で過剰露光・蛍光色化していた。
  //         map 側を 50% 透明にすることで、 シェーディングの影響を半分に抑える。
  //         + emissive 側は色補正用に弱く乗せる。
  //         結果: ピンク/黄もちゃんと色が出て、 緑が蛍光化せず、 黒インクも見える。
  baseCtx.globalCompositeOperation = 'source-over';
  baseCtx.globalAlpha = 0.55;
  for (const p of state.prints) {
    drawPrint(p, baseCtx);
  }
  baseCtx.globalAlpha = 1.0;

  // ?showAreas=1 のとき、PRINT_AREAS 全箇所をカラー枠で可視化（位置デバッグ用）
  const showAreas = new URLSearchParams(location.search).get('showAreas') === '1';
  if (showAreas && scaledAreas) {
    const colors = {
      front_center:'#ff0000', back_center:'#0080ff', left_chest:'#00c800',
      right_chest:'#ff8000', left_sleeve:'#c800ff', right_sleeve:'#ffd700',
      back_upper:'#00d8d8', front_hem:'#ff00ff', back_hem:'#80ff00',
    };
    const fs = Math.max(20, W * 0.018);
    printCtx.font = 'bold ' + fs + 'px sans-serif';
    printCtx.lineWidth = Math.max(4, W * 0.004);
    for (const k in scaledAreas) {
      const a = scaledAreas[k];
      const c = colors[k] || '#ff0000';
      printCtx.strokeStyle = c;
      printCtx.fillStyle = c;
      printCtx.strokeRect(a.x, a.y, a.width, a.height);
      // ラベル背景
      const label = a.label || k;
      const tw = printCtx.measureText(label).width;
      printCtx.globalAlpha = 0.85;
      printCtx.fillRect(a.x + 4, a.y + 4, tw + 12, fs + 10);
      printCtx.globalAlpha = 1.0;
      printCtx.fillStyle = '#ffffff';
      printCtx.fillText(label, a.x + 10, a.y + fs + 8);
    }
  }

  if (currentTexture) currentTexture.needsUpdate = true;
  if (printTexture) printTexture.needsUpdate = true;
}

function drawPrint(print, ctx) {
  if (!print.image) return;
  const targetCtx = ctx || baseCtx;
  // ★ K2 2026-05-01: 袖いっぱい(34x12cm) サイズ時は *_full 領域に自動切替
  // ★ L3 2026-05-02: 袖先(12cm角内) サイズ時は *_cuff 領域に自動切替 (手首寄り)
  let areaKey = print.area;
  const isFullSleeve = print.size && (print.size.includes('34x12') || print.size.includes('34×12') || print.size.includes('袖いっぱい'));
  const isCuff       = print.size && (print.size.includes('12cm角') || print.size.includes('袖先'));
  if (isFullSleeve){
    if (areaKey === 'left_sleeve' && scaledAreas['left_sleeve_full']) areaKey = 'left_sleeve_full';
    else if (areaKey === 'right_sleeve' && scaledAreas['right_sleeve_full']) areaKey = 'right_sleeve_full';
  } else if (isCuff){
    if (areaKey === 'left_sleeve' && scaledAreas['left_sleeve_cuff']) areaKey = 'left_sleeve_cuff';
    else if (areaKey === 'right_sleeve' && scaledAreas['right_sleeve_cuff']) areaKey = 'right_sleeve_cuff';
  }
  const area = scaledAreas[areaKey];
  if (!area) { console.warn('Unknown area:', areaKey); return; }

  const scale = getScaleFactor(areaKey, print.method, print.size);
  const targetW = area.width * scale;
  const targetH = area.height * scale;

  // contain: 比率維持
  const imgAR = print.image.naturalWidth / print.image.naturalHeight;
  const areaAR = targetW / targetH;
  let dw, dh;
  if (imgAR > areaAR) { dw = targetW; dh = targetW / imgAR; }
  else { dh = targetH; dw = targetH * imgAR; }

  // alignX/alignY
  let dx, dy;
  switch (area.alignX) {
    case 'left':   dx = area.x; break;
    case 'right':  dx = area.x + area.width - dw; break;
    default:       dx = area.x + (area.width - dw) / 2;
  }
  switch (area.alignY) {
    case 'top':    dy = area.y; break;
    case 'bottom': dy = area.y + area.height - dh; break;
    default:       dy = area.y + (area.height - dh) / 2;
  }

  // ★ 2026-04-26 追加: offsetX/offsetY (-1.0..1.0) でユーザーが微調整可能
  //   area.width/height の半分を最大値とし、area 境界を超えない範囲に制限
  const offX = (typeof print.offsetX === 'number') ? print.offsetX : 0;
  const offY = (typeof print.offsetY === 'number') ? print.offsetY : 0;
  if (offX || offY) {
    const maxShiftX = (area.width  - dw) / 2 + (area.width  * 0.20);   // 多少 area からはみ出してもOK
    const maxShiftY = (area.height - dh) / 2 + (area.height * 0.20);
    dx += Math.max(-maxShiftX, Math.min(maxShiftX, offX * area.width  * 0.5));
    dy += Math.max(-maxShiftY, Math.min(maxShiftY, offY * area.height * 0.5));
  }

  // ★ 2026-04-26: rotated 描画ロジックは廃止。
  //   代わりに「画像自体のアスペクト比を入れ替える」方式に変更
  //   (画像レベルで縦長↔横長 を切替えれば、文字の向きは正向きのまま保てる)
  //   → 詳細は v13 側 getPrintSampleImg(size, rotated) を参照

  // 2026-04-24: 多段階ダウンサンプリング（halving法）
  //   3200px→205pxのような大比率縮小は1回のdrawImageでは粗く見える（袖プリントが荒い主因）。
  //   画像を 2 倍ずつ縮小する中間キャンバスを通すことでシャープな結果を得る。
  //   結果は print オブジェクトにキャッシュして再計算を避ける。
  const prevSmooth = targetCtx.imageSmoothingEnabled;
  const prevQuality = targetCtx.imageSmoothingQuality;
  targetCtx.imageSmoothingEnabled = true;
  targetCtx.imageSmoothingQuality = 'high';
  const srcImg = _getSharpResizedSource(print, dw, dh);
  targetCtx.drawImage(srcImg, dx, dy, dw, dh);
  targetCtx.imageSmoothingEnabled = prevSmooth;
  if (prevQuality) targetCtx.imageSmoothingQuality = prevQuality;
}

// 多段階ダウンサンプリングで中間キャンバスを生成（キャッシュ付き）
function _getSharpResizedSource(print, dw, dh){
  const img = print.image;
  let srcW = img.naturalWidth || img.width;
  let srcH = img.naturalHeight || img.height;
  // 長辺比で判定（最大2倍になるまで halving）
  const ratioW = srcW / Math.max(1, dw);
  const ratioH = srcH / Math.max(1, dh);
  const maxRatio = Math.max(ratioW, ratioH);
  // 2倍以下ならそのまま（halving不要）
  if(maxRatio <= 2) return img;
  // キャッシュキー: 目標サイズの10単位で丸めて再利用（微小な変化で再生成しない）
  const cacheKey = `${Math.round(dw/10)}_${Math.round(dh/10)}`;
  if(!print._sharpCache) print._sharpCache = {};
  if(print._sharpCache[cacheKey]) return print._sharpCache[cacheKey];
  // halving
  let curCanvas = img;
  let curW = srcW, curH = srcH;
  const targetMax = Math.max(dw, dh) * 2;  // 目標の2倍まで縮める
  let safety = 8;  // 無限ループ回避
  while(Math.max(curW, curH) > targetMax && safety-- > 0){
    const nextW = Math.max(1, Math.floor(curW / 2));
    const nextH = Math.max(1, Math.floor(curH / 2));
    const buf = document.createElement('canvas');
    buf.width = nextW;
    buf.height = nextH;
    const bctx = buf.getContext('2d');
    bctx.imageSmoothingEnabled = true;
    bctx.imageSmoothingQuality = 'high';
    bctx.drawImage(curCanvas, 0, 0, nextW, nextH);
    curCanvas = buf;
    curW = nextW; curH = nextH;
  }
  print._sharpCache[cacheKey] = curCanvas;
  return curCanvas;
}

// ============================================================
// GLB読み込み
// ============================================================
function base64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes.buffer;
}

function onLoaded(gltf) {
  const model = gltf.scene;
  scene.add(model);

  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);
  model.position.y += size.y / 2;

  // 2026-04-24 夜: カメラ距離をビューポートアスペクトに応じてフィット計算。
  //   従来は maxDim * 2.4 の固定倍率で余白が大きすぎ、モデル小さく見えてた。
  //   ここでは camera.fov（縦FOV）と実描画アスペクトから水平FOVを算出し、
  //   モデルの縦/横（size.y, size.x）のうち画面内でより多くを占める方に合わせる。
  //   1.12倍のマージンで両端に少し余白を残す。
  const maxDim = Math.max(size.x, size.y, size.z);
  const vFov = camera.fov * Math.PI / 180;
  const aspect = (renderer.domElement.width / Math.max(1, renderer.domElement.height)) || (innerWidth / innerHeight);
  const hFov = 2 * Math.atan(Math.tan(vFov / 2) * aspect);
  const distY = (size.y / 2) / Math.tan(vFov / 2);
  const distX = (size.x / 2) / Math.tan(hFov / 2);
  const dist = Math.max(distX, distY) * 1.12;  // 両端に12%マージン
  camera.position.set(0, size.y * 0.55, dist);
  controls.target.set(0, size.y * 0.5, 0);
  initialCamPos.copy(camera.position);
  initialTarget.copy(controls.target);
  controls.minDistance = maxDim * 0.6;
  controls.maxDistance = maxDim * 6;

  model.traverse((obj) => {
    if (obj.isMesh && obj.material) {
      obj.material = obj.material.clone();
      if ('metalness' in obj.material) obj.material.metalness = 0;
      // 完全マット仕上げ（バックライトの反射ハイライトを抑える・モデル間で見た目統一）
      if ('roughness' in obj.material) obj.material.roughness = 1.0;
      // 余計なテクスチャマップを全て無効化（V1モデルの metalness/normal/AO等が悪さするのを防ぐ）
      ['metalnessMap','roughnessMap','normalMap','aoMap','emissiveMap','alphaMap','bumpMap','displacementMap','envMap','lightMap']
        .forEach(k => { if (obj.material[k]) obj.material[k] = null; });
      if (obj.material.color) obj.material.color.set(0xffffff);
      // 透過・両面描画を切る（裏面が見えると表に漏れて見えるため）
      obj.material.transparent = false;
      obj.material.alphaTest = 0;
      obj.material.side = THREE.FrontSide;
      obj.material.depthWrite = true;
      obj.material.depthTest = true;
      obj.material.needsUpdate = true;
      shirtMeshes.push(obj);
    }
  });

  doneProgress();
  hintEl.classList.add('show');
  setTimeout(() => hintEl.classList.remove('show'), 3500);
  controls.autoRotate = true;
  updateRotateBtn();

  initTextureCompose();
  loadInputConfig();

  // 2026-04-25: 親ウィンドウに「モデル準備完了」を通知（v13プロト等が
  // この timing で spinOnce を発動できるようにする。後方互換: 既存の
  // 親側はこのメッセージを listen していないので無害）
  try {
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'tshirt3d-ready' }, '*');
    }
  } catch(e){}
}

function onError(err) {
  console.error(err);
  doneProgress();
  errorEl.style.display = 'block';
  errorDetailEl.textContent = String(err?.message || err);
}

const loader = new GLTFLoader();
setProgress(20);

// ACTIVE_MODEL に応じて動的に glb-data-*.js を読み込み、Base64から GLB をパース
function _loadActiveModelGlb() {
  const embedded = window[ACTIVE_MODEL.glbVar];
  if (embedded) {
    setProgress(60);
    try {
      const buffer = base64ToArrayBuffer(embedded);
      setProgress(85);
      loader.parse(buffer, '', onLoaded, onError);
    } catch (e) { onError(e); }
    return;
  }
  // 埋め込みなしの場合は外部glbファイルにフォールバック
  loader.load(ACTIVE_MODEL.fallbackGlb,
    onLoaded,
    (p) => { if (p.lengthComputable) setProgress(Math.round(p.loaded / p.total * 90)); },
    onError
  );
}

// glb-data-*.js が <script> タグでまだ読まれていなければ動的ロード
if (window[ACTIVE_MODEL.glbVar]) {
  // 既にロード済み（Tシャツの場合 <script src="./glb-data.js"> でロード済）
  setTimeout(_loadActiveModelGlb, 40);
} else {
  setProgress(30);
  const s = document.createElement('script');
  s.src = ACTIVE_MODEL.glbScript;
  s.onload = () => { setProgress(50); _loadActiveModelGlb(); };
  s.onerror = () => {
    console.warn('glb-data scriptロード失敗、fallbackGlbを試みます:', ACTIVE_MODEL.glbScript);
    _loadActiveModelGlb();
  };
  document.head.appendChild(s);
}

// ============================================================
// 入力受付（フォーム連携）
//  優先順:
//   1. URL ?config=<base64 JSON>
//   2. window.name (postMessage で前もって流し込み可)
//   3. sessionStorage.tshirt3dConfig
//   4. window.TSHIRT_DESIGN_SVG (旧仕組みフォールバック)
//   5. 何もなければデモパネル表示
// ============================================================
function loadInputConfig() {
  const params = new URLSearchParams(location.search);
  const isEmbed = params.get('embed') === '1';
  const isDemo  = params.get('demo')  === '1';
  if (isEmbed) document.body.classList.add('embed');

  // 0. GLB読込前にバッファされたpostMessage設定があれば最優先で処理
  if (_pendingConfig) {
    const pc = _pendingConfig;
    _pendingConfig = null;
    applyExternalConfig(pc);
    if (isDemo) showDemoPanel();
    return;
  }

  // 0.3. 2026-04-24: ?cfg=<base64url(JSON)> で直接 config を受け取る（推奨方式）
  //      GAS fetch が不要 → CORS/MIME 問題ゼロ、ロードも速い
  //      JSON内のdriveIdは Drive CDN 直接参照の image URL に変換して画像取得
  const cfgParam = params.get('cfg');
  if (cfgParam) {
    _loadConfigFromUrl(cfgParam, isDemo);
    return;
  }

  // 0.5. 2026-04-23: ?order=CK-xxx で既存注文の3Dを復元（後方互換・非推奨）
  //      GAS社内プラットフォームの getOrderViewerConfig を叩いて
  //      bodyColor + prints[] を取得し applyExternalConfig に渡す。
  //      URL長制限や CORS を気にせずに済む。
  const orderId = params.get('order');
  if (orderId) {
    _loadConfigFromOrder(orderId, isDemo);
    return;  // 非同期なのでここで抜ける
  }

  // 1. URL config
  let cfg = null;
  const cfgB64 = params.get('config');
  if (cfgB64) {
    try { cfg = JSON.parse(decodeURIComponent(escape(atob(cfgB64)))); }
    catch(e) { console.warn('config parse failed', e); }
  }

  // 1.5. localStorage key（2026-04-22 追加: URL長制限回避用）
  //       フォームが ?cfgKey=xxx で渡し、localStorage.xxx に JSON を置いておく方式
  if (!cfg) {
    const cfgKey = params.get('cfgKey');
    if (cfgKey) {
      try {
        const raw = localStorage.getItem(cfgKey);
        if (raw) {
          cfg = JSON.parse(raw);
          // 使い捨て: 読み取ったら削除（ストレージ溜め込み防止）
          try { localStorage.removeItem(cfgKey); } catch(e){}
        }
      } catch(e) { console.warn('localStorage cfgKey parse failed', e); }
    }
  }

  // 2. sessionStorage
  //   ★ 2026-04-26: embed=1 (v13 等の親フォームから iframe 経由で開かれた場合) は
  //     sessionStorage を読まない。過去のテストデータ (MIYAMOTO HOMARE等) が
  //     復元されて 3D に意図しないプリントが出る問題を防ぐ。親が postMessage で渡してくる。
  if (!cfg && !isEmbed && sessionStorage.tshirt3dConfig) {
    try { cfg = JSON.parse(sessionStorage.tshirt3dConfig); }
    catch(e) { console.warn('sessionStorage parse failed', e); }
  }

  if (cfg) {
    applyExternalConfig(cfg);
    if (isDemo) showDemoPanel();
  } else if (isDemo && window.TSHIRT_DESIGN_SVG) {
    // ?demo=1 のときだけ design-data.js のテストデザインを自動表示
    loadImage(window.TSHIRT_DESIGN_SVG).then(img => {
      state.prints = [{ id: 1, area: 'front_center', method: 'シルクスクリーン', size: '標準（34cm内）', image: img, imageDataUrl: window.TSHIRT_DESIGN_SVG }];
      applyState();
      refreshDemoPrintList();
    });
    showDemoPanel();
  } else if (isDemo) {
    showDemoPanel();
  }
  // 通常アクセス時は何も自動表示せず、真っ白Tシャツのみ
}

// 2026-04-23: ?order=CK-xxx で GAS からconfig取得
//  社内プラットフォームGAS の getOrderViewerConfig エンドポイントを叩く。
//  デプロイURLは CLAUDE.md 記載の platform GAS を使用。
const _GAS_PLATFORM_URL = 'https://script.google.com/macros/s/AKfycby8Yz78JtNQlS615qq44QhQ0qEKjOL9An_qn6DelmN16Mm16VlTfF8kjfcl0nrJA788LQ/exec';
// 2026-04-24: ?cfg=<base64url(JSON)> の直接URL方式（最優先・最高速）
// JSON 内に driveId が含まれており、Drive の公開画像URLから直接 <img> で取得。
// GAS fetch/JSONP/iframe 一切不要。読み込み 2-5秒。
function _loadConfigFromUrl(cfgParam, isDemo){
  const ind = document.createElement('div');
  ind.id = '_orderLoadInd';
  ind.textContent = '3D設定を読み込み中...';
  ind.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:16px 24px;background:rgba(0,0,0,.8);color:#fff;border-radius:8px;font:14px sans-serif;z-index:99999';
  document.body.appendChild(ind);
  const _removeInd = () => { try { document.getElementById('_orderLoadInd')?.remove(); } catch(_){} };
  try {
    // base64url → UTF-8 → JSON
    const b64 = cfgParam.replace(/-/g, '+').replace(/_/g, '/');
    const pad = b64.length % 4;
    const padded = pad ? b64 + '='.repeat(4 - pad) : b64;
    const bin = atob(padded);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const json = new TextDecoder('utf-8').decode(bytes);
    const cfg = JSON.parse(json);
    console.log('[loadConfig] cfg URL decoded:', cfg);
    // prints[].driveId → Drive CDN 画像URL に変換
    if (Array.isArray(cfg.prints)) {
      for (const p of cfg.prints) {
        if (p.driveId && !p.imageDataUrl) {
          // Drive の CORS 対応公開URLの第一候補（高解像度で取得）
          // 2026-04-24: =s4096 に上げて画質向上。元画像が3200pxなら原寸、より大きければ拡大なし
          p.imageDataUrl = `https://lh3.googleusercontent.com/d/${encodeURIComponent(p.driveId)}=s4096`;
        }
      }
    }
    // model も URL パラメータで上書き可能
    if (cfg.model && typeof setModel === 'function') {
      try { setModel(cfg.model); } catch(e){}
    }
    applyExternalConfig(cfg)
      .then(() => { _removeInd(); if (isDemo) showDemoPanel(); })
      .catch(err => {
        _removeInd();
        console.error('[loadConfig] applyExternalConfig failed:', err);
        alert('3D表示の構築に失敗しました: ' + (err.message || err));
      });
  } catch (e) {
    _removeInd();
    console.error('[loadConfig] cfg decode failed:', e);
    alert('3D設定のURL解析に失敗しました。URLが壊れている可能性があります。\n' + (e.message || e));
  }
}

// 2026-04-24: 2段フォールバック方式
//   ① fetch（シンプル・標準） → 失敗したら
//   ② JSONP（<script> タグ） → 失敗したら
//   ③ タイムアウトでエラー表示
//   GASの /exec は 302 リダイレクトするが、fetch / <script> どちらも環境依存で失敗することが
//   あるため、両方試す戦略。
function _loadConfigFromOrder(orderId, isDemo){
  const ind = document.createElement('div');
  ind.id = '_orderLoadInd';
  ind.textContent = `注文 ${orderId} の3D設定を取得中...`;
  ind.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);padding:16px 24px;background:rgba(0,0,0,.8);color:#fff;border-radius:8px;font:14px sans-serif;z-index:99999';
  document.body.appendChild(ind);

  const _removeInd = () => { try { document.getElementById('_orderLoadInd')?.remove(); } catch(_){} };

  const _applyData = async (data, source) => {
    try {
      if(!data || data.ok !== true){
        _removeInd();
        alert(`注文データが取得できませんでした (${source}): ${(data && data.error) || 'unknown'}`);
        return;
      }
      const cfg = data.config;
      if(!cfg || !Array.isArray(cfg.prints) || cfg.prints.length === 0){
        _removeInd();
        let msg = 'この注文には3D表示できるプリントデータがありません\n';
        if(data._debug){
          msg += `\n▼診断情報:\n商品内プリント数: ${data._debug.totalPrintsInItem}\n反映可能: ${data._debug.included}\n除外: ${data._debug.skipped.length}件\n`;
          (data._debug.skipped || []).forEach((s, i) => {
            msg += `  [${i+1}] 箇所="${s.location}" 理由: ${s.reason}\n`;
          });
        }
        console.warn('3D config empty:', data);
        alert(msg);
        return;
      }
      if(cfg.model && typeof setModel === 'function'){
        try { setModel(cfg.model); } catch(e){}
      }
      await applyExternalConfig(cfg);
      _removeInd();
      if(isDemo) showDemoPanel();
    } catch(e){
      _removeInd();
      console.error('[loadConfigFromOrder] apply failed ('+source+')', e);
      alert(`3D設定の適用に失敗しました: ${e.message || e}`);
    }
  };

  // ① fetch を試す（シンプル・プリフライト無しのGET）
  const fetchUrl = `${_GAS_PLATFORM_URL}?action=getOrderViewerConfig&orderId=${encodeURIComponent(orderId)}`;
  console.log('[loadConfig] trying fetch:', fetchUrl);
  fetch(fetchUrl, { method: 'GET', redirect: 'follow' })
    .then(res => {
      console.log('[loadConfig] fetch response', res.status, res.headers.get('content-type'));
      if(!res.ok) throw new Error('HTTP ' + res.status);
      return res.text();
    })
    .then(txt => {
      let data;
      try { data = JSON.parse(txt); }
      catch(parseErr){
        console.warn('[loadConfig] fetch: parse failed, content preview:', txt.substring(0, 300));
        throw parseErr;
      }
      return _applyData(data, 'fetch');
    })
    .catch(fetchErr => {
      console.warn('[loadConfig] fetch failed, falling back to JSONP:', fetchErr.message || fetchErr);
      // ② JSONP フォールバック
      _loadViaJsonp(orderId, _applyData, (jsonpErr) => {
        console.warn('[loadConfig] JSONP also failed, falling back to iframe+postMessage:', jsonpErr);
        // ③ iframe + postMessage 最終フォールバック
        _loadViaIframe(orderId, _applyData);
      });
    });
}

// ③ iframe + postMessage 方式（CORS/MIME 問題を回避する最終手段）
// GAS HtmlService を iframe でロードし、中のスクリプトが親に postMessage で送る
function _loadViaIframe(orderId, applyFn){
  const iframeUrl = `${_GAS_PLATFORM_URL}?action=getOrderViewerConfig&orderId=${encodeURIComponent(orderId)}&mode=iframe`;
  console.log('[loadConfig] trying iframe+postMessage:', iframeUrl);
  let iframe = null;
  let done = false;
  const timeoutId = setTimeout(() => {
    if(done) return; done = true; cleanup();
    console.error('[loadConfig] iframe timeout (25s)');
    alert('3D設定の取得に失敗しました\n\n' +
          '全ての通信方式（fetch / JSONP / iframe）で失敗しました。\n' +
          '■ 対処法:\n' +
          '1. Ctrl+Shift+R でハードリロード\n' +
          '2. 別のブラウザ（Edge, Firefox等）で試す\n' +
          '3. スマートフォンから開いてみる\n' +
          '4. ネットワーク環境を変える');
  }, 25000);
  const cleanup = () => {
    try { document.getElementById('_orderLoadInd')?.remove(); } catch(_){}
    window.removeEventListener('message', handler);
    try { if(iframe) iframe.remove(); } catch(_){}
    clearTimeout(timeoutId);
  };
  const handler = async (e) => {
    if(done) return;
    if(!e.data || e.data.type !== 'cocoro3dConfig') return;
    done = true;
    clearTimeout(timeoutId);
    window.removeEventListener('message', handler);
    try { if(iframe) iframe.remove(); } catch(_){}
    await applyFn(e.data.data, 'iframe');
  };
  window.addEventListener('message', handler);
  iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;left:-10000px;top:-10000px;width:1px;height:1px;border:0;visibility:hidden';
  iframe.src = iframeUrl;
  iframe.onerror = (err) => {
    if(done) return; done = true; cleanup();
    console.error('[loadConfig] iframe onerror', err);
    alert('3D設定の取得に失敗しました\n（iframe load error）\n\n別ブラウザでお試しください。');
  };
  document.body.appendChild(iframe);
}

function _loadViaJsonp(orderId, applyFn, onFailCallback){
  const cbName = '_cocoro3d_cb_' + Date.now() + '_' + Math.floor(Math.random() * 1e6);
  let script = null;
  let done = false;
  const timeoutId = setTimeout(() => {
    if(done) return; done = true;
    try { if(script) script.remove(); } catch(_){}
    try { delete window[cbName]; } catch(_){}
    clearTimeout(timeoutId);
    console.warn('[loadConfig] JSONP timeout (15s)');
    if(typeof onFailCallback === 'function') onFailCallback(new Error('JSONP timeout'));
  }, 15000);
  window[cbName] = async function(data){
    if(done) return; done = true;
    clearTimeout(timeoutId);
    try { if(script) script.remove(); } catch(_){}
    try { delete window[cbName]; } catch(_){}
    await applyFn(data, 'jsonp');
  };
  script = document.createElement('script');
  script.src = `${_GAS_PLATFORM_URL}?action=getOrderViewerConfig&orderId=${encodeURIComponent(orderId)}&callback=${cbName}`;
  console.log('[loadConfig] trying JSONP:', script.src);
  script.onerror = (e) => {
    if(done) return; done = true;
    clearTimeout(timeoutId);
    try { if(script) script.remove(); } catch(_){}
    try { delete window[cbName]; } catch(_){}
    console.error('[loadConfig] JSONP script load error', e);
    if(typeof onFailCallback === 'function') onFailCallback(new Error('JSONP script load error'));
  };
  document.head.appendChild(script);
}

async function applyExternalConfig(cfg) {
  if (cfg.bodyColor) {
    state.bodyColor = cfg.bodyColor;
    document.getElementById('shirtColor').value = cfg.bodyColor;
    document.getElementById('demoBodyColor').value = cfg.bodyColor;
  }
  if (Array.isArray(cfg.prints)) {
    state.prints = [];
    for (let i = 0; i < cfg.prints.length; i++) {
      const p = cfg.prints[i];
      const img = await loadImage(p.imageDataUrl || p.image || p.url);
      state.prints.push({
        id: Date.now() + i,
        area: p.area, method: p.method, size: p.size, image: img,
        rotated: !!p.rotated,                                      // ★ 縦横切替
        offsetX: (typeof p.offsetX === 'number') ? p.offsetX : 0,
        offsetY: (typeof p.offsetY === 'number') ? p.offsetY : 0,
      });
    }
    refreshDemoPrintList();
  }
  // 2026-04-25: 外部からのスピン制御（後方互換: 未指定なら現状維持）
  if (typeof cfg.rotationSpeed === 'number' && isFinite(cfg.rotationSpeed)) {
    _baselineRotateSpeed = cfg.rotationSpeed;
    if (!_spinning) controls.autoRotateSpeed = _baselineRotateSpeed;
  }
  if (cfg.resetView === true) {
    _resetView();      // spin なしで camera を正面に戻す
  } else if (cfg.spinOnce === true) {
    _triggerMagicSpin();
  } else if (cfg.focusArea && typeof cfg.focusArea === 'string') {
    // ★ 2026-04-26: プリント箇所選択時の自動回転
    _focusToArea(cfg.focusArea);
  }
  // ★ 2026-04-26: 位置調整モード (専用)
  if (cfg.adjustMode === true && cfg.adjustArea){
    _enterAdjustMode(cfg.adjustArea);
  } else if (cfg.adjustMode === false){
    _exitAdjustMode();
  }
  applyState();
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    // 2026-04-24: Drive 画像URLは lh3.googleusercontent.com / drive.google.com/uc の2形式を試す
    //   CORS や HTTP エラーで失敗した場合に別形式でリトライすることで成功率UP
    const candidates = [src];
    const m = /^https:\/\/lh3\.googleusercontent\.com\/d\/([^=]+)(?:=.*)?$/.exec(src);
    if (m) {
      // lh3 → drive.google.com/thumbnail へのフォールバック
      candidates.push(`https://drive.google.com/thumbnail?id=${m[1]}&sz=w3200`);
      candidates.push(`https://drive.google.com/uc?export=view&id=${m[1]}`);
    }
    let idx = 0;
    const tryNext = () => {
      if (idx >= candidates.length) { reject(new Error('all image sources failed: ' + src)); return; }
      const url = candidates[idx++];
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => resolve(img);
      img.onerror = () => {
        console.warn('[loadImage] failed:', url, '→ trying next');
        tryNext();
      };
      img.src = url;
    };
    tryNext();
  });
}

/* ============================================================
   ★ 2026-04-26 追加: 位置調整モード (postMessage `adjustMode: areaKey` で起動)
   ============================================================ */
let _adjustArea = null;       // 調整対象 area key (null = 通常モード)
let _adjustDragging = false;
let _adjustStartXY = null;    // pointerdown 時の screen 座標
let _adjustBaseOffset = null; // pointerdown 時点の offset
const _ADJUST_SENSITIVITY = 280;  // 画面 280px ドラッグ で offset 1.0 (適度な操作感)

function _enterAdjustMode(area){
  if(!area) return;
  _adjustArea = area;
  controls.enabled = false;
  controls.autoRotate = false;
  document.body.classList.add('adjusting');
  const ov = document.getElementById('adjustOverlay');
  if(ov) ov.classList.add('on');
  // 該当 print の現在 offset を初期値として記録
  const p = state.prints.find(p => p.area === area);
  _adjustBaseOffset = p ? { x: p.offsetX || 0, y: p.offsetY || 0 } : { x:0, y:0 };
}
function _exitAdjustMode(){
  _adjustArea = null;
  _adjustDragging = false;
  _adjustStartXY = null;
  _adjustBaseOffset = null;
  controls.enabled = true;
  controls.autoRotate = true;
  document.body.classList.remove('adjusting','dragging');
  const ov = document.getElementById('adjustOverlay');
  if(ov) ov.classList.remove('on');
  updateRotateBtn();
}
function _adjustResetCurrent(){
  if(!_adjustArea) return;
  const p = state.prints.find(p => p.area === _adjustArea);
  if(p){
    p.offsetX = 0; p.offsetY = 0;
    _adjustBaseOffset = { x:0, y:0 };
    applyState();
    _notifyOffsetToParent(_adjustArea, 0, 0);
  }
}
function _notifyOffsetToParent(area, offsetX, offsetY){
  try {
    parent.postMessage({ type:'tshirt3d-offset', area, offsetX, offsetY }, '*');
  } catch(e){}
}

// canvas (renderer.domElement) のドラッグハンドラ
function _bindAdjustDrag(){
  const el = renderer.domElement;
  if(!el) return;
  const onDown = (e) => {
    if(!_adjustArea) return;
    _adjustDragging = true;
    document.body.classList.add('dragging');
    _adjustStartXY = { x: e.clientX, y: e.clientY };
    const p = state.prints.find(p => p.area === _adjustArea);
    _adjustBaseOffset = p ? { x: p.offsetX || 0, y: p.offsetY || 0 } : { x:0, y:0 };
    e.preventDefault();
  };
  const onMove = (e) => {
    if(!_adjustArea || !_adjustDragging || !_adjustStartXY) return;
    // 画面ドラッグ量 → offset 変位
    // X: 画面右ドラッグ = +offsetX (テクスチャ右へ)
    // Y: 画面下ドラッグ = +offsetY (テクスチャ下へ)
    const dx = e.clientX - _adjustStartXY.x;
    const dy = e.clientY - _adjustStartXY.y;
    const ox = Math.max(-1.5, Math.min(1.5, _adjustBaseOffset.x + dx / _ADJUST_SENSITIVITY));
    const oy = Math.max(-1.5, Math.min(1.5, _adjustBaseOffset.y + dy / _ADJUST_SENSITIVITY));
    const p = state.prints.find(p => p.area === _adjustArea);
    if(p){ p.offsetX = ox; p.offsetY = oy; }
    applyState();
    _notifyOffsetToParent(_adjustArea, ox, oy);
    e.preventDefault();
  };
  const onUp = (e) => {
    if(!_adjustArea) return;
    _adjustDragging = false;
    _adjustStartXY = null;
    document.body.classList.remove('dragging');
  };
  el.addEventListener('pointerdown', onDown, { passive:false });
  el.addEventListener('pointermove', onMove, { passive:false });
  el.addEventListener('pointerup',   onUp);
  el.addEventListener('pointercancel', onUp);
  el.addEventListener('pointerleave',  onUp);
}
_bindAdjustDrag();

function tick() {
  // 2026-04-25: 魔法スピン進行（quintic + 静止フェーズ）
  //   フェーズ1 (0..HOLD_MS): 正面静止 — ユーザーが「正面のT-shirt」を確実に見える
  //   フェーズ2 (HOLD_MS..HOLD_MS+DURATION): 288°回転を quintic で滑らかに
  //   フェーズ3 (終了後): baseline速度の autoRotate に handoff
  if (_spinning) {
    const elapsed = performance.now() - _spinStartTime;
    if (elapsed < _SPIN_HOLD_MS) {
      // 静止フェーズ — 何もしない（カメラは _snapToFront でセット済み）
    } else if (elapsed >= _SPIN_HOLD_MS + _SPIN_DURATION_MS) {
      const remaining = _SPIN_TOTAL_RAD - _spinAccumulatedRad;
      if (Math.abs(remaining) > 1e-6) _rotateCameraAroundTargetY(remaining);
      _spinAccumulatedRad = _SPIN_TOTAL_RAD;
      _spinning = false;
      controls.autoRotateSpeed = _baselineRotateSpeed;
      // ★ spinOnce 後は連続回転に handoff (focusArea で初めて停止)
      controls.autoRotate = true;
      updateRotateBtn();
    } else {
      const s = (elapsed - _SPIN_HOLD_MS) / _SPIN_DURATION_MS;
      const s2 = s*s, s3 = s2*s, s4 = s3*s, s5 = s4*s;
      const fs = _spinCoefA*s + _spinCoefB*s2 + _spinCoefC*s3 + _spinCoefD*s4 + _spinCoefE*s5;
      const totalSoFar = _SPIN_TOTAL_RAD * fs;
      const delta = totalSoFar - _spinAccumulatedRad;
      _spinAccumulatedRad = totalSoFar;
      if (delta) _rotateCameraAroundTargetY(delta);
    }
  }
  // ★ 2026-04-26 修正: focus アニメ進行 (magic spin と同じ累積方式)
  //   旧版バグ: targetAngle (線形値、2π超え可) と curAngle (atan2 で [-π,π] にラップ) を
  //             直接引き算 → 毎フレーム余計に回転 → 8〜10周ぐるぐる現象
  //   修正版: 累積回転量 _focusAccumulated を保持し、目標累積量との差分だけ回す
  if (_focusing) {
    const elapsed = performance.now() - _focusStartTime;
    const t = Math.min(1, elapsed / _FOCUS_DURATION_MS);
    // ease-in-out cubic
    const eased = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    const totalSoFar = _focusDeltaRad * eased;        // 累積目標 (0 → _focusDeltaRad)
    const delta = totalSoFar - _focusAccumulated;     // 前フレームからの差分
    _focusAccumulated = totalSoFar;
    if (Math.abs(delta) > 1e-6) _rotateCameraAroundTargetY(delta);
    if (t >= 1) {
      // 残り回転を完全実行 (浮動小数点誤差吸収)
      const remaining = _focusDeltaRad - _focusAccumulated;
      if (Math.abs(remaining) > 1e-6) _rotateCameraAroundTargetY(remaining);
      _focusAccumulated = _focusDeltaRad;
      _focusing = false;
      // ★ F4 2026-04-30: focusArea 終了後は自動回転を停止 (プリント箇所で止まり続ける)
      controls.autoRotate = false;
      updateRotateBtn();
    }
  }
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

});
document.getElementById('demoPresets').addEventListener('click', e => {
  const c = e.target.dataset.c;
  if (c) {
    state.bodyColor = c;
    document.getElementById('demoBodyColor').value = c;
    document.getElementById('shirtColor').value = c;
    applyState();
  }
});

document.getElementById('demoAddPrint').addEventListener('click', async () => {
  const file = demoFile.files[0];
  if (!file) { alert('画像ファイルを選んでください'); return; }
  const reader = new FileReader();
  reader.onload = async ev => {
    const img = await loadImage(ev.target.result);
    state.prints.push({
      id: Date.now(),
      area: demoArea.value,
      method: demoMethod.value,
      size: demoSize.value,
      image: img,
      imageDataUrl: ev.target.result,
    });
    refreshDemoPrintList();
    applyState();
  };
  reader.readAsDataURL(file);
});

function refreshDemoPrintList() {
  document.getElementById('demoCount').textContent = state.prints.length;
  if (state.prints.length === 0) {
    demoPrintList.innerHTML = '<div style="color:#888; font-size:11px;">まだプリントがありません</div>';
    return;
  }
  demoPrintList.innerHTML = state.prints.map((p, i) => {
    const a = PRINT_AREAS[p.area];
    return `<div class="print-row">
      <div class="ph">${i+1}. ${a?.label || p.area}</div>
      <div class="pi">${p.method} / ${p.size}</div>
      <div class="actions">
        <button class="danger" onclick="removeDemoPrint(${i})">削除</button>
      </div>
    </div>`;
  }).join('');
}

window.removeDemoPrint = (idx) => {
  state.prints.splice(idx, 1);
  refreshDemoPrintList();
  applyState();
};

document.getElementById('demoClearAll').addEventListener('click', () => {
  state.prints = [];
  refreshDemoPrintList();
  applyState();
});

document.getElementById('demoExportConfig').addEventListener('click', () => {
  const cfg = {
    bodyColor: state.bodyColor,
    prints: state.prints.map(p => ({
      area: p.area, method: p.method, size: p.size,
      imageDataUrl: p.imageDataUrl || (p.image?.src),
    })),
  };
  const json = JSON.stringify(cfg, null, 2);
  navigator.clipboard.writeText(json).then(() => {
    alert('JSON設定をクリップボードにコピーしました\n\n' + json.substring(0, 200) + '...');
  });
});

document.getElementById('demoOpenWithConfig').addEventListener('click', () => {
  const cfg = {
    bodyColor: state.bodyColor,
    prints: state.prints.map(p => ({
      area: p.area, method: p.method, size: p.size,
      imageDataUrl: p.imageDataUrl || (p.image?.src),
    })),
  };
  const b64 = btoa(unescape(encodeURIComponent(JSON.stringify(cfg))));
  const url = `${location.pathname}?config=${b64}`;
  window.open(url, '_blank');
});

</script>
</body>
</html>
